<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <!-- clawd 蚊香眼晕头转向 v8 (2026-05-17)
       v7 (codex) 三处错改, v8 全部修正:
       1) 眼睛: 不再 core+tail 拆分搅动. 用 stroke-dashoffset 沿 path 流动,
                端点不动, 视觉上纹路向内吸. 整螺旋叠加 6s 慢转作"微动".
       2) 身体: 不再 ±3° 小抖. translate 走小椭圆顺时针轨道, linear 不缓动.
                配 ±1.5° 轻微 rotate 同步, 营造"画圈摇晃"而非"左右摆".
       3) 星星: 完全恢复 v6 椭圆轨道. cx=7.5 cy=2 rx=4 ry=1.5, 6s linear, 3 颗
                错相位 (0/-2/-4s). 放回 upper-body 外, 不跟身体倾.

       脚处理: 给一个 same-phase 椭圆轨道, 幅度 = 身体 1/3.
              纯静止会和身体明显脱节 (v7 屁股错位的根因),
              幅度 1/3 视觉近似站定, 接缝可吸收.
  -->

  <style>
    /* ===== 上半身: 顺时针椭圆 (rx 0.6 ry 0.4) + ±3.5° rotate, 3s linear ===== */
    #upper-body {
      transform-box: view-box;
      transform-origin: 7.5px 13px;
      animation: body-orbit 3s linear infinite;
    }
    @keyframes body-orbit {
      0%   { transform: translate(0px, -0.4px)  rotate(0deg); }      /* 12 */
      25%  { transform: translate(0.6px, 0px)   rotate(3.5deg); }    /* 3  */
      50%  { transform: translate(0px, 0.4px)   rotate(0deg); }      /* 6  */
      75%  { transform: translate(-0.6px, 0px)  rotate(-3.5deg); }   /* 9  */
      100% { transform: translate(0px, -0.4px)  rotate(0deg); }
    }

    /* 脚: 同相位小椭圆, 1/3 幅度, 避免和身体脱节 */
    #legs-only {
      transform-box: view-box;
      transform-origin: 7.5px 15px;
      animation: legs-orbit 3s linear infinite;
    }
    @keyframes legs-orbit {
      0%   { transform: translate(0px, -0.12px); }
      25%  { transform: translate(0.2px, 0px); }
      50%  { transform: translate(0px, 0.12px); }
      75%  { transform: translate(-0.2px, 0px); }
      100% { transform: translate(0px, -0.12px); }
    }

    #ground-shadow {
      transform-box: view-box;
      transform-origin: 7.5px 15.5px;
      animation: shadow-breathe 3s linear infinite;
    }
    @keyframes shadow-breathe {
      0%   { transform: scaleX(1.00); opacity: 0.48; }
      25%  { transform: scaleX(0.96); opacity: 0.42; }
      50%  { transform: scaleX(1.04); opacity: 0.52; }
      75%  { transform: scaleX(0.96); opacity: 0.42; }
      100% { transform: scaleX(1.00); opacity: 0.48; }
    }

    /* 手臂: "晕态挂着甩" — translateY 上下 + rotate ±8°, 左右反相 */
    #left-arm {
      transform-box: view-box;
      transform-origin: 2px 10px;
      animation: arm-wobble 3s linear infinite;
    }
    #right-arm {
      transform-box: view-box;
      transform-origin: 13px 10px;
      animation: arm-wobble 3s linear infinite;
      animation-delay: -1.5s;
    }
    @keyframes arm-wobble {
      0%   { transform: translateY(0px)    rotate(0deg); }
      25%  { transform: translateY(0.4px)  rotate(-8deg); }   /* 手下沉, 内甩 */
      50%  { transform: translateY(0px)    rotate(0deg); }
      75%  { transform: translateY(-0.4px) rotate(8deg); }    /* 手抬起, 外撇 */
      100% { transform: translateY(0px)    rotate(0deg); }
    }

    /* ===== 眼睛: 单层 stroke + dasharray + dashoffset 流动 =====
       v8d 双层亮纹方案放弃 (鹿鹿觉得奇怪). 单层有断点方案, 参数由
       dizzy-flow-tuner.html 调出: 8 断点 / gap 0.4 / 0.8s.
       密集小亮点高速流过, 累积视觉 = 蚊香眼晕眩流动感. */
    .eye-path {
      stroke-dasharray: 0.85 0.40;
      animation: eye-flow 0.8s linear infinite;
    }
    /* 右眼 path 几何和左眼镜像, 起点 CCW 改 CW. 同向 dashoffset 会造成两眼
       视觉镜像 (左转 / 右转). 用 reverse 反转动画方向, 让两眼视觉同向流. */
    .right-eye-wrap .eye-path {
      animation-direction: reverse;
    }
    @keyframes eye-flow {
      from { stroke-dashoffset: 0; }
      to   { stroke-dashoffset: -1.25; }  /* 周期 = dash + gap */
    }

    .left-eye-wrap {
      transform-box: view-box;
      transform-origin: 4.5px 9px;
      animation: micro-spin-cw 6s linear infinite;
    }
    .right-eye-wrap {
      transform-box: view-box;
      transform-origin: 10.5px 9px;
      animation: micro-spin-cw 6s linear infinite;
    }
    @keyframes micro-spin-cw {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ===== 黄星: 恢复 v6 椭圆轨道 ===== */
    .star {
      transform-box: view-box;
      transform-origin: center;
      animation: star-orbit 6s linear infinite;
    }
    .star-1 { animation-delay: 0s; }
    .star-2 { animation-delay: -2s; }
    .star-3 { animation-delay: -4s; }
    @keyframes star-orbit {
      /* cx=7.5 cy=2 rx=4 ry=1.5, 顺时针 (12→3→6→9→12) */
      0%   { transform: translate(7.5px, 0.5px) scale(1.0); opacity: 1; }   /* 12 */
      25%  { transform: translate(11.5px, 2px) scale(1.0); opacity: 1; }    /* 3 */
      50%  { transform: translate(7.5px, 3.5px) scale(0.75); opacity: 0.6;} /* 6 后方缩 */
      75%  { transform: translate(3.5px, 2px) scale(1.0); opacity: 1; }     /* 9 */
      100% { transform: translate(7.5px, 0.5px) scale(1.0); opacity: 1; }
    }

    /* ===== 蓝斑点: 贴脸抖动 + 闪烁, 营造"晕眩第二层" =====
       3 颗 0.5×0.5 单 rect, #88B8E0 偏粉天蓝 (避开 boss 金 + 拉开冷暖).
       各自小椭圆 (rx 0.4 ry 0.25) 轨道 + opacity 0→1→0 闪烁, 周期错开
       (1.4s / 1.7s / 1.9s) 避免同步整齐感. 位置贴脸不抢黄星大轨道. */
    .blue-dot {
      transform-box: view-box;
      transform-origin: center;
    }
    .blue-1 { animation: blue-flick-1 1.4s linear infinite; }
    .blue-2 { animation: blue-flick-2 1.7s linear infinite; animation-delay: -0.6s; }
    .blue-3 { animation: blue-flick-3 1.9s linear infinite; animation-delay: -1.0s; }

    @keyframes blue-flick-1 {  /* 左前上 center (4, 5) */
      0%   { transform: translate(3.6px, 5.0px); opacity: 0; }
      30%  { transform: translate(4.0px, 4.75px); opacity: 0.95; }
      60%  { transform: translate(4.4px, 5.0px); opacity: 0.95; }
      90%  { transform: translate(4.0px, 5.25px); opacity: 0; }
      100% { transform: translate(3.6px, 5.0px); opacity: 0; }
    }
    @keyframes blue-flick-2 {  /* 右前上 center (11, 5) */
      0%   { transform: translate(10.6px, 5.0px); opacity: 0; }
      30%  { transform: translate(11.0px, 4.75px); opacity: 0.95; }
      60%  { transform: translate(11.4px, 5.0px); opacity: 0.95; }
      90%  { transform: translate(11.0px, 5.25px); opacity: 0; }
      100% { transform: translate(10.6px, 5.0px); opacity: 0; }
    }
    @keyframes blue-flick-3 {  /* 头顶下 center (7.5, 4) */
      0%   { transform: translate(7.1px, 4.0px); opacity: 0; }
      30%  { transform: translate(7.5px, 3.75px); opacity: 0.9; }
      60%  { transform: translate(7.9px, 4.0px); opacity: 0.9; }
      90%  { transform: translate(7.5px, 4.25px); opacity: 0; }
      100% { transform: translate(7.1px, 4.0px); opacity: 0; }
    }
  </style>

  <rect id="ground-shadow" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.48"/>

  <g id="legs-only" fill="#DE886D">
    <rect x="3" y="13" width="1" height="2"/>
    <rect x="5" y="13" width="1" height="2"/>
    <rect x="9" y="13" width="1" height="2"/>
    <rect x="11" y="13" width="1" height="2"/>
  </g>

  <g id="upper-body">
    <g fill="#DE886D">
      <rect id="torso" x="2" y="6" width="11" height="7"/>
      <g id="left-arm"><rect x="0" y="9" width="2" height="2"/></g>
      <g id="right-arm"><rect x="13" y="9" width="2" height="2"/></g>
    </g>

    <g fill="none" stroke="#000000" stroke-width="0.52" stroke-linecap="round" stroke-linejoin="round" shape-rendering="geometricPrecision">
      <g class="left-eye-wrap">
        <path class="eye-path" d="M 4.969,9.260 L 4.946,9.299 L 4.917,9.336 L 4.883,9.370 L 4.842,9.400 L 4.797,9.426 L 4.746,9.446 L 4.692,9.460 L 4.634,9.467 L 4.573,9.466 L 4.512,9.458 L 4.450,9.441 L 4.388,9.416 L 4.329,9.383 L 4.272,9.341 L 4.220,9.291 L 4.173,9.233 L 4.133,9.168 L 4.100,9.097 L 4.075,9.021 L 4.060,8.940 L 4.055,8.855 L 4.060,8.769 L 4.076,8.682 L 4.103,8.596 L 4.141,8.511 L 4.190,8.431 L 4.251,8.355 L 4.321,8.286 L 4.400,8.224 L 4.489,8.171 L 4.585,8.129 L 4.687,8.098 L 4.794,8.079 L 4.905,8.074 L 5.018,8.081 L 5.131,8.103 L 5.242,8.139 L 5.351,8.188 L 5.454,8.252 L 5.551,8.328 L 5.639,8.417 L 5.717,8.518 L 5.783,8.629 L 5.837,8.749 L 5.876,8.877 L 5.901,9.010 L 5.909,9.147 L 5.901,9.287 L 5.876,9.426 L 5.833,9.564 L 5.774,9.697 L 5.698,9.824 L 5.607,9.943 L 5.500,10.052 L 5.380,10.148 L 5.247,10.230 L 5.104,10.297 L 4.951,10.347 L 4.792,10.379 L 4.628,10.392 L 4.462,10.385 L 4.295,10.359 L 4.131,10.312 L 3.972,10.245 L 3.820,10.159 L 3.678,10.054 L 3.547,9.931 L 3.431,9.792 L 3.331,9.639 L 3.249,9.473 L 3.187,9.297 L 3.145,9.112 L 3.125,8.922 L 3.128,8.729 L 3.155,8.535 L 3.204,8.344 L 3.277,8.158 L 3.372,7.980 L 3.488,7.813 L 3.625,7.659"/>
      </g>
      <g class="right-eye-wrap">
        <path class="eye-path" d="M 10.010,8.760 L 10.029,8.719 L 10.054,8.680 L 10.086,8.643 L 10.123,8.610 L 10.166,8.580 L 10.215,8.556 L 10.268,8.537 L 10.325,8.525 L 10.385,8.520 L 10.448,8.523 L 10.511,8.534 L 10.574,8.554 L 10.636,8.582 L 10.696,8.619 L 10.753,8.664 L 10.804,8.718 L 10.850,8.779 L 10.889,8.847 L 10.920,8.921 L 10.943,9.000 L 10.955,9.083 L 10.958,9.170 L 10.949,9.258 L 10.930,9.346 L 10.899,9.434 L 10.857,9.518 L 10.804,9.599 L 10.740,9.674 L 10.666,9.743 L 10.582,9.803 L 10.491,9.853 L 10.391,9.893 L 10.286,9.921 L 10.176,9.936 L 10.063,9.938 L 9.949,9.927 L 9.835,9.901 L 9.722,9.861 L 9.614,9.807 L 9.511,9.739 L 9.416,9.658 L 9.329,9.564 L 9.253,9.460 L 9.189,9.345 L 9.139,9.221 L 9.103,9.090 L 9.083,8.954 L 9.079,8.814 L 9.092,8.673 L 9.122,8.533 L 9.169,8.395 L 9.233,8.261 L 9.314,8.135 L 9.411,8.018 L 9.523,7.911 L 9.648,7.818 L 9.785,7.738 L 9.932,7.675 L 10.088,7.630 L 10.250,7.603 L 10.416,7.595 L 10.584,7.607 L 10.752,7.639 L 10.916,7.692 L 11.075,7.765 L 11.226,7.857 L 11.367,7.968 L 11.495,8.096 L 11.608,8.240 L 11.704,8.398 L 11.782,8.568 L 11.839,8.748 L 11.875,8.936 L 11.889,9.129 L 11.880,9.324 L 11.847,9.519 L 11.791,9.711 L 11.712,9.896 L 11.610,10.073 L 11.487,10.237"/>
      </g>
    </g>
  </g>

  <!-- ★ 星星: upper-body 外, 不跟身体倾 -->
  <g id="stars" fill="#FFE066" shape-rendering="crispEdges">
    <g class="star star-1">
      <rect x="-0.25" y="-0.75" width="0.5" height="0.5"/>
      <rect x="-0.75" y="-0.25" width="0.5" height="0.5"/>
      <rect x="-0.25" y="-0.25" width="0.5" height="0.5"/>
      <rect x="0.25" y="-0.25" width="0.5" height="0.5"/>
      <rect x="-0.25" y="0.25" width="0.5" height="0.5"/>
    </g>
    <g class="star star-2">
      <rect x="-0.25" y="-0.75" width="0.5" height="0.5"/>
      <rect x="-0.75" y="-0.25" width="0.5" height="0.5"/>
      <rect x="-0.25" y="-0.25" width="0.5" height="0.5"/>
      <rect x="0.25" y="-0.25" width="0.5" height="0.5"/>
      <rect x="-0.25" y="0.25" width="0.5" height="0.5"/>
    </g>
    <g class="star star-3">
      <rect x="-0.25" y="-0.75" width="0.5" height="0.5"/>
      <rect x="-0.75" y="-0.25" width="0.5" height="0.5"/>
      <rect x="-0.25" y="-0.25" width="0.5" height="0.5"/>
      <rect x="0.25" y="-0.25" width="0.5" height="0.5"/>
      <rect x="-0.25" y="0.25" width="0.5" height="0.5"/>
    </g>
  </g>

  <!-- 蓝斑点: upper-body 外, 不跟身体倾 -->
  <g id="blue-dots" fill="#88B8E0" shape-rendering="crispEdges">
    <rect class="blue-dot blue-1" x="-0.25" y="-0.25" width="0.5" height="0.5"/>
    <rect class="blue-dot blue-2" x="-0.25" y="-0.25" width="0.5" height="0.5"/>
    <rect class="blue-dot blue-3" x="-0.25" y="-0.25" width="0.5" height="0.5"/>
  </g>
</svg>
