<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <!--
    clawd 右手咖啡杯动画版

    基准:
    - 静帧来自 clawd-coffee-hand-static.svg
    - 原静态帧文件保持不变

    动画:
    - 右手把杯子带到中间
    - 左手想接杯子
    - 杯子太烫，左手缩回
    - 杯子脱手落地并洒出咖啡
    - 杯子落地后 clawd 呆住并失落下沉
  -->

  <title>clawd coffee hand animated v3</title>

  <defs>
    <clipPath id="inside-torso">
      <rect x="2" y="6" width="11" height="7"/>
    </clipPath>

    <clipPath id="coffee-fill-wipe">
      <rect x="2.25" y="1.12" width="6.9" height="0.72">
        <animate
          attributeName="y"
          dur="4.4s"
          repeatCount="indefinite"
          keyTimes="0;0.385;0.458;0.532;0.589;0.985;1"
          values="1.12;1.12;1.34;1.66;1.84;1.84;1.12"/>
        <animate
          attributeName="height"
          dur="4.4s"
          repeatCount="indefinite"
          keyTimes="0;0.385;0.458;0.532;0.589;0.985;1"
          values="0.72;0.72;0.5;0.18;0;0;0.72"/>
      </rect>
    </clipPath>
  </defs>

  <rect id="ground-shadow" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5">
    <animate
      attributeName="opacity"
      dur="4.4s"
      repeatCount="indefinite"
      keyTimes="0;0.458;0.54;0.638;1"
      values="0.5;0.5;0.72;0.5;0.5"/>
    <animate
      attributeName="width"
      dur="4.4s"
      repeatCount="indefinite"
      keyTimes="0;0.458;0.54;0.638;1"
      values="9;9;10.2;9;9"/>
  </rect>

  <g id="master-group">
    <g id="character-motion">
      <animateTransform
        attributeName="transform"
        type="translate"
        dur="4.4s"
        repeatCount="indefinite"
        keyTimes="0;0.311;0.36;0.409;0.466;0.573;0.655;0.985;1"
        values="0 0;0 0;-0.4 -0.35;0.45 0.12;-0.15 0;0 0;0 0.35;0 0.35;0 0"/>

      <g id="body-color-group" fill="#DE886D">
        <rect id="torso" x="2" y="6" width="11" height="7"/>

        <g id="left-arm-contact-shadow" clip-path="url(#inside-torso)" fill="#A85A3A">
          <rect x="-0.4" y="9" width="2.4" height="2.4" opacity="0">
            <animate
              attributeName="opacity"
              dur="4.4s"
              repeatCount="indefinite"
              keyTimes="0;0.196;0.245;0.319;0.368;1"
              values="0;0;1;1;0;0"/>
            <animateTransform
              attributeName="transform"
              type="translate"
              dur="4.4s"
              repeatCount="indefinite"
              keyTimes="0;0.147;0.245;0.311;0.36;0.458;0.985;1"
              values="0 0;0 0;7 -0.45;7 -0.45;1.1 -1.25;0 0;0 0;0 0"/>
          </rect>
        </g>

        <rect id="left-arm" x="0" y="9" width="2" height="2">
          <animateTransform
            attributeName="transform"
            type="translate"
            dur="4.4s"
            repeatCount="indefinite"
            keyTimes="0;0.147;0.245;0.311;0.36;0.458;0.589;0.671;0.985;1"
            values="0 0;0 0;7 -0.45;7 -0.45;1.1 -1.25;0 0;0 0.25;0 1.35;0 1.35;0 0"/>
        </rect>

        <rect id="right-arm" x="13" y="9" width="2" height="2">
          <animateTransform
            attributeName="transform"
            type="translate"
            dur="4.4s"
            repeatCount="indefinite"
            keyTimes="0;0.131;0.245;0.344;0.409;0.507;0.589;0.671;0.985;1"
            values="0 0;-1.3 -0.25;-3.1 -0.65;-3 -0.65;-1.45 -1.05;0.35 0.08;0 0.25;0 1.35;0 1.35;0 0"/>
        </rect>

        <rect id="outer-left-leg" x="3" y="13" width="1" height="2"/>
        <rect id="inner-left-leg" x="5" y="13" width="1" height="2"/>
        <rect id="inner-right-leg" x="9" y="13" width="1" height="2"/>
        <rect id="outer-right-leg" x="11" y="13" width="1" height="2"/>
      </g>

      <g id="eyes-color-group" fill="#000000">
        <rect id="left-eye" x="4" y="8" width="1" height="2">
          <animate
            attributeName="y"
            dur="4.4s"
            repeatCount="indefinite"
            keyTimes="0;0.295;0.352;0.475;0.573;0.655;0.985;1"
            values="8;8;7.4;8;8;8.85;8.85;8"/>
          <animate
            attributeName="height"
            dur="4.4s"
            repeatCount="indefinite"
            keyTimes="0;0.295;0.352;0.475;0.573;0.655;0.985;1"
            values="2;2;2.8;2;2;1;1;2"/>
        </rect>
        <rect id="right-eye" x="10" y="8" width="1" height="2">
          <animate
            attributeName="y"
            dur="4.4s"
            repeatCount="indefinite"
            keyTimes="0;0.295;0.352;0.475;0.573;0.655;0.985;1"
            values="8;8;7.4;8;8;8.85;8.85;8"/>
          <animate
            attributeName="height"
            dur="4.4s"
            repeatCount="indefinite"
            keyTimes="0;0.295;0.352;0.475;0.573;0.655;0.985;1"
            values="2;2;2.8;2;2;1;1;2"/>
        </rect>
      </g>

      <g id="speechless-dots" fill="#5A8FD8">
        <rect x="5.025" y="3.425" width="0.8" height="0.8" opacity="0">
          <animate
            attributeName="opacity"
            dur="4.4s"
            repeatCount="indefinite"
            keyTimes="0;0.61;0.63;0.985;1"
            values="0;0;1;1;0"/>
        </rect>
        <rect x="7.075" y="3.425" width="0.8" height="0.8" opacity="0">
          <animate
            attributeName="opacity"
            dur="4.4s"
            repeatCount="indefinite"
            keyTimes="0;0.68;0.7;0.985;1"
            values="0;0;1;1;0"/>
        </rect>
        <rect x="9.125" y="3.425" width="0.8" height="0.8" opacity="0">
          <animate
            attributeName="opacity"
            dur="4.4s"
            repeatCount="indefinite"
            keyTimes="0;0.75;0.77;0.985;1"
            values="0;0;1;1;0"/>
        </rect>
      </g>
    </g>

    <g id="coffee-cup-placement" transform="translate(13.3 7.5)">
      <animateTransform
        attributeName="transform"
        type="translate"
        dur="4.4s"
        repeatCount="indefinite"
        keyTimes="0;0.147;0.254;0.344;0.409;0.499;0.573;0.622;0.655;0.985;1"
        values="13.3 7.5;10 6.65;8.6 6.25;8.6 6.25;8.85 6.6;8 9.1;7.5 10.7;7.65 10.48;7.5 10.7;7.5 10.7;13.3 7.5"/>

      <g id="coffee-cup-scale" transform="scale(0.58)">
        <g id="steam" stroke="#F4F4F6" stroke-width="0.38" stroke-linecap="round" fill="none" opacity="0">
          <animate
            attributeName="opacity"
            dur="4.4s"
            repeatCount="indefinite"
            keyTimes="0;0.123;0.237;0.311;0.385;0.985;1"
            values="0;0.15;0.62;0.95;0;0;0"/>
          <path d="M3.8 0.4 C3.2 -0.2 4.3 -0.8 3.8 -1.5">
            <animateTransform
              attributeName="transform"
              type="translate"
              dur="4.4s"
              repeatCount="indefinite"
              keyTimes="0;0.18;0.311;0.385;1"
              values="0 0;0.15 -0.2;-0.15 -0.7;0 -0.9;0 0"/>
          </path>
          <path d="M5.6 0.25 C5 -0.35 6.2 -0.85 5.6 -1.65">
            <animateTransform
              attributeName="transform"
              type="translate"
              dur="4.4s"
              repeatCount="indefinite"
              keyTimes="0;0.18;0.311;0.385;1"
              values="0 0;-0.2 -0.25;0.1 -0.85;0 -1;0 0"/>
          </path>
          <path d="M7.35 0.4 C6.75 -0.15 7.9 -0.7 7.35 -1.45">
            <animateTransform
              attributeName="transform"
              type="translate"
              dur="4.4s"
              repeatCount="indefinite"
              keyTimes="0;0.18;0.311;0.385;1"
              values="0 0;0.2 -0.25;-0.1 -0.75;0 -0.9;0 0"/>
          </path>
        </g>

        <g id="cup-tilt">
          <animateTransform
            attributeName="transform"
            type="rotate"
            dur="4.4s"
            repeatCount="indefinite"
            keyTimes="0;0.147;0.254;0.344;0.409;0.499;0.573;0.622;0.655;0.985;1"
            values="0 5.7 4.2;-2 5.7 4.2;-6 5.7 4.2;-6 5.7 4.2;14 5.7 4.2;-42 5.7 4.2;-85 5.7 4.2;-78 5.7 4.2;-85 5.7 4.2;-85 5.7 4.2;0 5.7 4.2"/>

          <g id="coffee-cup" shape-rendering="auto">
            <path
              d="M2.95 2.05
                 C1.45 2.05 0.65 2.9 0.65 4
                 C0.65 5.1 1.45 5.95 2.95 5.95
                 L2.95 4.9
                 C2.15 4.9 1.75 4.55 1.75 4
                 C1.75 3.45 2.15 3.1 2.95 3.1
                 Z"
              fill="#D7D7DC"/>
            <path
              d="M2.65 2.45
                 C1.55 2.55 1.05 3.15 1.05 4
                 C1.05 4.85 1.55 5.45 2.65 5.55
                 L2.65 4.9
                 C2.1 4.78 1.8 4.45 1.8 4
                 C1.8 3.55 2.1 3.22 2.65 3.1
                 Z"
              fill="#AFAFB8"
              opacity="0.55"/>
            <path
              d="M2.55 1.65
                 H8.65
                 C9.05 1.65 9.35 1.95 9.3 2.35
                 L8.8 6.45
                 C8.7 7.15 8.2 7.5 7.5 7.5
                 H3.9
                 C3.2 7.5 2.7 7.15 2.6 6.45
                 L2.1 2.35
                 C2.05 1.95 2.35 1.65 2.55 1.65
                 Z"
              fill="#D7D7DC"/>
            <path
              d="M2.62 0.97
                 H8.78
                 C9.23 0.97 9.58 1.27 9.58 1.62
                 C9.58 1.97 9.23 2.27 8.78 2.27
                 H2.62
                 C2.17 2.27 1.82 1.97 1.82 1.62
                 C1.82 1.27 2.17 0.97 2.62 0.97
                 Z"
              fill="#F4F4F6"/>
            <path
              id="coffee-fill"
              d="M2.8 1.12
                 H8.6
                 C8.9 1.12 9.15 1.28 9.15 1.48
                 C9.15 1.68 8.9 1.84 8.6 1.84
                 H2.8
                 C2.5 1.84 2.25 1.68 2.25 1.48
                 C2.25 1.28 2.5 1.12 2.8 1.12
                 Z"
              fill="#3A1F14"
              clip-path="url(#coffee-fill-wipe)"/>
            <g id="cup-mark" transform="translate(5.65 4.72) scale(2)" opacity="0.78">
              <g stroke="#D97757" stroke-width="0.18" stroke-linecap="round">
                <line x1="0" y1="-0.28" x2="0" y2="-0.82"/>
                <line x1="0" y1="-0.28" x2="0" y2="-0.82" transform="rotate(30)"/>
                <line x1="0" y1="-0.28" x2="0" y2="-0.82" transform="rotate(60)"/>
                <line x1="0" y1="-0.28" x2="0" y2="-0.82" transform="rotate(90)"/>
                <line x1="0" y1="-0.28" x2="0" y2="-0.82" transform="rotate(120)"/>
                <line x1="0" y1="-0.28" x2="0" y2="-0.82" transform="rotate(150)"/>
                <line x1="0" y1="-0.28" x2="0" y2="-0.82" transform="rotate(180)"/>
                <line x1="0" y1="-0.28" x2="0" y2="-0.82" transform="rotate(210)"/>
                <line x1="0" y1="-0.28" x2="0" y2="-0.82" transform="rotate(240)"/>
                <line x1="0" y1="-0.28" x2="0" y2="-0.82" transform="rotate(270)"/>
                <line x1="0" y1="-0.28" x2="0" y2="-0.82" transform="rotate(300)"/>
                <line x1="0" y1="-0.28" x2="0" y2="-0.82" transform="rotate(330)"/>
              </g>
              <circle cx="0" cy="0" r="0.24" fill="#D97757"/>
            </g>
          </g>
        </g>
      </g>
    </g>

    <g id="coffee-spill" fill="#3A1F14" stroke="#3A1F14" stroke-linecap="round" stroke-linejoin="round">
      <ellipse id="coffee-puddle-main" cx="7.15" cy="15.3" rx="0" ry="0.08" opacity="0">
        <animate
          attributeName="opacity"
          dur="4.4s"
          repeatCount="indefinite"
          keyTimes="0;0.475;0.524;0.985;1"
          values="0;0;0.72;0.72;0"/>
        <animate
          attributeName="rx"
          dur="4.4s"
          repeatCount="indefinite"
          keyTimes="0;0.475;0.54;0.638;0.985;1"
          values="0;0;1.55;2.35;2.35;0"/>
        <animate
          attributeName="ry"
          dur="4.4s"
          repeatCount="indefinite"
          keyTimes="0;0.475;0.54;0.638;0.985;1"
          values="0.08;0.08;0.22;0.28;0.28;0.08"/>
      </ellipse>

      <circle id="splash-drop-left" cx="5.35" cy="14.75" r="0.18" opacity="0">
        <animate
          attributeName="opacity"
          dur="4.4s"
          repeatCount="indefinite"
          keyTimes="0;0.475;0.524;0.589;0.985;1"
          values="0;0;0.8;0;0;0"/>
        <animate
          attributeName="cy"
          dur="4.4s"
          repeatCount="indefinite"
          keyTimes="0;0.475;0.524;0.589;1"
          values="14.75;14.75;14.25;14.75;14.75"/>
      </circle>

      <circle id="splash-drop-right" cx="8.95" cy="14.6" r="0.14" opacity="0">
        <animate
          attributeName="opacity"
          dur="4.4s"
          repeatCount="indefinite"
          keyTimes="0;0.475;0.524;0.589;0.985;1"
          values="0;0;0.75;0;0;0"/>
        <animate
          attributeName="cy"
          dur="4.4s"
          repeatCount="indefinite"
          keyTimes="0;0.475;0.524;0.589;1"
          values="14.6;14.6;14.08;14.6;14.6"/>
      </circle>
    </g>
  </g>
</svg>
